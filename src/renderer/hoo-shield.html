<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hoo Shield</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070808;
      --panel: rgba(255,255,255,.055);
      --line: rgba(255,255,255,.1);
      --text: #f8fafc;
      --muted: #a7b0bd;
      --soft: #69717d;
      --orange: #ff7a1a;
      --green: #48e08c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(72,224,140,.12), transparent 28rem),
        radial-gradient(circle at 80% 20%, rgba(255,122,26,.12), transparent 30rem),
        linear-gradient(180deg, #0c0f0f, var(--bg));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 28px;
    }
    .card {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: clamp(28px, 6vw, 54px);
      background: linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.035));
      box-shadow: 0 28px 90px rgba(0,0,0,.55);
      text-align: center;
    }
    .owl {
      width: 112px;
      height: 112px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 34px;
      background: radial-gradient(circle at 50% 25%, rgba(255,255,255,.14), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 18px 40px rgba(0,0,0,.32);
    }
    .owl svg { width: 74px; height: 74px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(72,224,140,.1);
      color: #a7f3c7;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      letter-spacing: -.04em;
      line-height: 1;
    }
    p {
      max-width: 560px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }
    .actions {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(255,255,255,.07);
      color: var(--text);
      font: inherit;
      font-weight: 760;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(135deg, var(--green), #22c55e);
      color: #05120a;
      border-color: transparent;
    }
    button:hover { transform: translateY(-1px); }
    details {
      margin: 28px auto 0;
      max-width: 620px;
      text-align: left;
      color: var(--soft);
      font-size: 13px;
    }
    summary { cursor: pointer; text-align: center; color: #89919e; }
    code {
      display: block;
      margin-top: 12px;
      padding: 14px;
      overflow: auto;
      border-radius: 16px;
      background: rgba(0,0,0,.28);
      color: #cbd5e1;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="owl" aria-hidden="true">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 50c0-22 18-38 40-38s40 16 40 38v22c0 22-18 36-40 36S20 94 20 72V50Z" fill="#101414" stroke="#48e08c" stroke-width="3"/>
        <path d="M30 21c14 0 24 8 30 20 6-12 16-20 30-20-6 10-8 18-7 28H37c1-10-1-18-7-28Z" fill="#18201d" stroke="#ff7a1a" stroke-width="3"/>
        <circle cx="45" cy="57" r="15" fill="#f8fafc"/>
        <circle cx="75" cy="57" r="15" fill="#f8fafc"/>
        <circle cx="48" cy="59" r="6" fill="#050505"/>
        <circle cx="72" cy="59" r="6" fill="#050505"/>
        <path d="M54 77h12l-6 8-6-8Z" fill="#ff7a1a"/>
        <path d="M42 92c10 7 26 7 36 0" stroke="#48e08c" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="pill">Hoo Shield</div>
    <h1 id="title">Hoo stopped that.</h1>
    <p id="message">This site tried to open a suspicious popup or forced redirect. Hoo blocked the new window and kept your browsing session safe.</p>
    <div class="actions">
      <button class="primary" onclick="location.href='hoo://home'">Go Home</button>
      <button onclick="history.back()">Go Back</button>
      <button id="externalBtn" hidden>Open externally</button>
      <button id="copyBtn">Copy link</button>
    </div>
    <details>
      <summary>Technical details</summary>
      <code id="details">No URL details available.</code>
    </details>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const url = params.get('url') || '';
    const reason = params.get('reason') || '';
    const external = params.get('external') === '1';
    const title = params.get('title');
    const message = params.get('message');

    if (title) document.getElementById('title').textContent = title;
    if (message || reason) document.getElementById('message').textContent = message || reason;
    document.getElementById('details').textContent = url || 'No URL details available.';

    const externalBtn = document.getElementById('externalBtn');
    if (external && url) {
      externalBtn.hidden = false;
      externalBtn.onclick = () => location.href = url;
    }
    document.getElementById('copyBtn').onclick = async () => {
      try {
        await navigator.clipboard.writeText(url || location.href);
        document.getElementById('copyBtn').textContent = 'Copied';
      } catch (_) {
        document.getElementById('copyBtn').textContent = 'Copy failed';
      }
    };
  </script>
</body>
</html>
